name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Lint, Typecheck, and Build
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Turbo)
        run: bun run build

      - name: Formatter/Linter (Biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run check-types

      - name: Unit Tests
        run: bun run test
