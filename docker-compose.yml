services:
  postgres:
    image: postgres:16-alpine
    container_name: start_elysia_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: start_elysia_db
    ports:
      - "5432:5432"
    volumes:
      - start_elysia_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: start_elysia_api
    restart: always
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/start_elysia_db?schema=public
      PORT: 4000
      NODE_ENV: production
      # Add other required API env vars here
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: start_elysia_web
    restart: always
    env_file:
      - apps/web/.env
    environment:
      VITE_API_URL: http://localhost:4000
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  start_elysia_pgdata:
