version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: testforge_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testforge_dev
    ports:
      - "5432:5432"
    volumes:
      - testforge_pgdata:/var/lib/postgresql/data

volumes:
  testforge_pgdata:
